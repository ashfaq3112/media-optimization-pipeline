name: Media Optimization Pipeline

# 1. THE TRIGGER: Only run when a PR is opened AND it contains images
on:
  pull_request:
    paths:
      - '**.jpg'
      - '**.jpeg'
      - '**.png'

jobs:
  optimize-assets:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Download the code from the Pull Request
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Step 2: Connect to the Kubernetes Cluster (The "Remote Control")
      # In the real world, you store your K8s credentials securely in GitHub Secrets
      - name: Configure Kubernetes Credentials
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG_DATA }}

      # Step 3: Press the "Start" Button Automatically
      - name: Deploy Kubernetes Job
        run: |
          echo "🚀 Triggering Media Optimization Job in Kubernetes..."
          kubectl apply -f k8s/optimization-job.yaml

      # Step 4: Wait for the job to finish and print the receipt
      - name: Wait for Job Completion & Print Logs
        run: |
          kubectl wait --for=condition=complete --timeout=120s job/media-optimizer-job
          echo "📊 PIPELINE RESULTS:"
          kubectl logs job/media-optimizer-job
          
      # Step 5: Clean up the K8s cluster for the next time
      - name: Delete Job
        run: kubectl delete job media-optimizer-job