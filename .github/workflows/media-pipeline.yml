name: Media Optimization Pipeline

on:
  pull_request:
    paths:
      - '**.jpg'
      - '**.jpeg'
      - '**.png'

jobs:
  optimize-assets:
    runs-on: self-hosted 
    
    steps:
      # Step 1: Checkout with full history so we can push changes back
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 
          token: ${{ secrets.GH_PAT }} # Use a PAT for write access

      # Step 2: Run the Kubernetes Job
      - name: Deploy Kubernetes Job
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          # Inject PR_NUMBER and MONGO_URI into the YAML
          envsubst < k8s/optimization-job.yaml | kubectl apply -f -

      # Step 3: Wait and Audit
      - name: Wait for Completion & Audit Logs
        run: |
          kubectl wait --for=condition=complete --timeout=180s job/media-optimizer-job
          JOB_LOGS=$(kubectl logs job/media-optimizer-job)
          echo "$JOB_LOGS"
          if echo "$JOB_LOGS" | grep -q "Failed"; then exit 1; fi

      # Step 4: THE MAGIC - Sync optimized files and code back to the PR
      - name: Push Changes back to PR
        if: success()
        run: |
          git config --global user.name "media-optimizer-bot"
          git config --global user.email "bot@devops.ai"
          git add .
          # Only commit if there are actually changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: automated webp conversion & ref updates" && git push origin HEAD:${{ github.head_ref }})

      # Step 5: Cleanup
      - name: Delete Job
        if: always()
        run: kubectl delete job media-optimizer-job --ignore-not-forward